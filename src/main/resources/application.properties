spring.application.name=backend

# ==============================
# MySQL Database Connection
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/campushub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Alfayaz@1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# Hibernate / JPA Settings
# ==============================
# 'update' = auto-creates/updates tables based on your Java entities (safe for dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# Server Port (default is 8080)
# ==============================
server.port=8080
